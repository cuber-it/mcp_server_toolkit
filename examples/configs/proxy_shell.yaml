# Proxy with shell plugin — HTTP transport
# Used by: run_proxy_shell.sh
server_name: "Shell Proxy"
transport: http
host: "127.0.0.1"
port: 12200
health_port: 12201
management_port: 12299
log_level: INFO

autoload:
  - shell

plugins:
  shell:
    enabled: true
    # working_dir: "/tmp"
    # timeout: 30
