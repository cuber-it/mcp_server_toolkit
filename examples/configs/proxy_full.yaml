# Proxy with demo plugins — HTTP transport
# Loads echo + greet at startup, demo_full available for runtime loading
server_name: "Full Proxy"
transport: http
host: "127.0.0.1"
port: 12200
health_port: 12201
management_port: 12299
log_level: INFO
# log_format: json          # "json" for machine-readable, default: "text"

# Management API authentication (optional)
# management_token: "${MCP_MGMT_TOKEN}"

auto_prefix: true

autoload:
  - echo
  - greet

plugins:
  echo:
    enabled: true
    prefix: false     # echo tools are already short, no prefix needed
  greet:
    enabled: true

# Production plugins are available as separate PyPI packages:
#   pip install mcp-shell-tools mcp-wekan-tools mcp-mattermost-tools
# Load via dotted import:
#   autoload:
#     - mcp_shell_tools.shell
#     - mcp_wekan_tools.wekan
# See: https://github.com/cuber-it/mcp_tools
