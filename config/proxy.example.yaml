# MCP Server Proxy — Example Configuration
server_name: "MCP Proxy"
transport: http
host: "0.0.0.0"
port: 12200
health_port: 12201
management_port: 12299
log_level: INFO
# log_format: json          # "json" for machine-readable, default: "text"

# Management API authentication (optional).
# Without token, no auth is required (development default).
# management_token: "${MCP_MGMT_TOKEN}"

# Auto-prefix: tool names get prefixed with plugin name to avoid collisions.
# "send_message" from plugin "mm" becomes "mm_send_message".
# Tools already starting with the prefix are not double-prefixed.
# Default: false. Per-plugin override with "prefix: custom" or "prefix: false".
auto_prefix: false

# Plugins loaded at startup
autoload:
  - echo

plugins:
  echo:
    enabled: true
  # mattermost:
  #   enabled: true
  #   url: "https://mm.example.com"
  #   token: "${MM_TOKEN}"
  #   prefix: "mm"           # custom prefix
  # wekan:
  #   enabled: true
  #   url: "http://localhost:12050"
  #   username: "admin"
  #   password: "secret"
  # shell:
  #   enabled: true
  #   timeout: 60
  #   allowed_paths:          # restrict filesystem access (optional)
  #     - "/home/user/projects"
