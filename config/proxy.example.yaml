# MCP Server Proxy — Example Configuration
server_name: "MCP Proxy"
transport: http
host: "0.0.0.0"
port: 12200
health_port: 12201
management_port: 12299
log_level: INFO
# log_format: json          # "json" for machine-readable, default: "text"

# OAuth (enabled by default for HTTP transport)
# Disable explicitly with: oauth_enabled: false
# oauth_server_url: "https://auth.example.com"
# oauth_public_url: "https://mcp.example.com"

# Management API authentication (optional).
# Without token, no auth is required (development default).
# management_token: "${MCP_MGMT_TOKEN}"

# Auto-prefix: tool names get prefixed with plugin name to avoid collisions.
# "send_message" from plugin "mm" becomes "mm_send_message".
# Tools already starting with the prefix are not double-prefixed.
# Default: false. Per-plugin override with "prefix: custom" or "prefix: false".
auto_prefix: false

# Plugins loaded at startup
autoload:
  - echo

plugins:
  echo:
    enabled: true

# Production plugins are available as separate PyPI packages:
#   pip install mcp-shell-tools mcp-wekan-tools mcp-mattermost-tools
# Load them via dotted import in autoload:
#   - mcp_shell_tools.shell
#   - mcp_wekan_tools.wekan
#   - mcp_mattermost_tools.mattermost
# See: https://github.com/cuber-it/mcp_tools
